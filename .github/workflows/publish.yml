name: Publish

on:
  push:
    branches:
      - main

permissions:
  id-token: write # Required for npm OIDC trusted publishing
  contents: write # Required to push the release tag

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history needed to find the latest version tag

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false # npm recommends no caching for release builds

      - name: Install dependencies
        run: pnpm install

      - name: Lint and test
        run: pnpm lint && pnpm test

      - name: Determine next version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -n "$LATEST" ]; then
            BASE="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            RELEASE_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            RELEASE_VERSION=$(node -p "require('./package.json').version")
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Bump version in package.json
        run: npm version "$RELEASE_VERSION" --no-git-tag-version

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish

      - name: Push release tag
        run: |
          git tag "v$RELEASE_VERSION"
          git push origin "v$RELEASE_VERSION"
